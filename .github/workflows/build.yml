name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install buildozer
        run: pip install buildozer

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Build APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: yes | buildozer android debug 2>&1

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: powerfit-apk
          path: bin/*.apk
          if-no-files-found: ignore

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: Power Fit v1.0.0
          body: |
            Power Fit - App de Treinos para Android
            
            Como instalar:
            1. Baixe o arquivo PowerFit.apk
            2. No celular, va em Configuracoes > Seguranca
            3. Ative "Fontes desconhecidas"
            4. Abra o arquivo APK e instale
          files: bin/*.apk
          draft: false
          prerelease: false
