name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore app/release-key.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias zentroxfit \
            -storepass zentroxfit2026 \
            -keypass zentroxfit2026 \
            -dname "CN=Zentrox Fit, OU=Dev, O=Zentrox, L=SP, ST=SP, C=BR"

      - name: Build Release APK
        run: |
          cd app
          chmod +x gradlew 2>/dev/null || true
          gradle assembleRelease --no-daemon || {
            echo "Gradle wrapper not found, using system gradle..."
            gradle assembleRelease --no-daemon
          }

      - name: Copy APK to releases
        run: |
          mkdir -p releases/android
          cp app/build/outputs/apk/release/*.apk releases/android/ZentroxFit.apk 2>/dev/null || \
          cp app/build/outputs/apk/debug/*.apk releases/android/ZentroxFit.apk 2>/dev/null || \
          echo "APK not found, checking build output..."
          find app/build/outputs -name "*.apk" -exec cp {} releases/android/ZentroxFit.apk \;

      - name: Delete old releases
        run: |
          gh release list --limit 5 --json tagName -q '.[].tagName' | while read tag; do
            gh release delete "$tag" -y 2>/dev/null || true
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.0.${{ github.run_number }}
          name: Zentrox Fit v3.0.${{ github.run_number }}
          body: |
            ## Zentrox Fit v3.0 - Build Completo

            ### 📱 Downloads

            **Android (APK):**
            - Baixe o arquivo `ZentroxFit.apk`
            - Instale ativando "Fontes desconhecidas"

            **iOS:**
            - O app iOS esta disponivel no diretorio `ios/` do repositorio
            - Para instalar, abra o projeto no Xcode e faca o build

            ### 🌍 Idiomas Suportados
            - 🇧🇷 Portugues (BR)
            - 🇺🇸 English (US)
            - 🇪🇸 Espanhol
            - 🇫🇷 Francais
            - 🇩🇪 Deutsch
            - 🇯🇵 日本語

            ### ✅ Novidades
            - Sistema de internacionalizacao (i18n)
            - Personalizacao de treinos
            - App iOS nativo
            - Melhorias de performance

            ### 📋 Como Instalar (Android)
            1. Baixe o ZentroxFit.apk
            2. Va em Configuracoes > Seguranca
            3. Ative "Fontes desconhecidas"
            4. Abra e instale o APK
          files: releases/android/ZentroxFit.apk
          draft: false
          prerelease: false
