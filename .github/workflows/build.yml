name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Gradle 8.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Build APK
        run: gradle assembleDebug

      - name: Copy APK to root
        run: cp app/build/outputs/apk/debug/app-debug.apk ./PowerFit.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: powerfit-apk
          path: PowerFit.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Power Fit v1.0.${{ github.run_number }}
          body: |
            Power Fit - App de Treinos para Android

            Como instalar:
            1. Baixe o arquivo PowerFit.apk
            2. No celular va em Configuracoes > Seguranca
            3. Ative "Fontes desconhecidas"
            4. Abra o arquivo APK e instale
          files: PowerFit.apk
          draft: false
          prerelease: false
