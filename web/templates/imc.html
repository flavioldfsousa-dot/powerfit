<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC - Zentrox Fit</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="screen">
        <div class="header">
            <div class="header-back" onclick="window.location.href='/menu'">←</div>
            <div class="header-title">CALCULAR IMC</div>
        </div>
        <div class="content">
            <div class="imc-container">
                <div class="form-group">
                    <label>Peso (kg)</label>
                    <input type="number" id="peso" placeholder="70" step="0.1">
                </div>
                <div class="form-group">
                    <label>Altura (cm)</label>
                    <input type="number" id="altura" placeholder="175">
                </div>
                
                <button class="btn-primary" onclick="calcular()">CALCULAR</button>
                
                <div class="imc-result" id="result" style="display:none;">
                    <div class="imc-value" id="imc-value">0</div>
                    <div class="imc-class" id="imc-class">-</div>
                    <div class="imc-bar">
                        <div class="imc-indicator" id="imc-indicator"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function calcular() {
            const peso = parseFloat(document.getElementById('peso').value);
            const altura = parseFloat(document.getElementById('altura').value) / 100;
            
            if (!peso || !altura) {
                alert('Preencha todos os campos!');
                return;
            }
            
            const imc = peso / (altura * altura);
            let classe = '';
            let cor = '';
            
            if (imc < 18.5) { classe = 'Abaixo do peso'; cor = '#00E5FF'; }
            else if (imc < 25) { classe = 'Peso normal'; cor = '#4CAF50'; }
            else if (imc < 30) { classe = 'Sobrepeso'; cor = '#FF9800'; }
            else if (imc < 35) { classe = 'Obesidade I'; cor = '#FF5722'; }
            else if (imc < 40) { classe = 'Obesidade II'; cor = '#FF2D55'; }
            else { classe = 'Obesidade III'; cor = '#B71C1C'; }
            
            document.getElementById('imc-value').textContent = imc.toFixed(1);
            document.getElementById('imc-value').style.color = cor;
            document.getElementById('imc-class').textContent = classe;
            document.getElementById('imc-class').style.color = cor;
            
            const pct = Math.min(Math.max((imc - 15) / 30 * 100, 0), 100);
            document.getElementById('imc-indicator').style.left = `${pct}%`;
            document.getElementById('imc-indicator').style.background = cor;
            
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
