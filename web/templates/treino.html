<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino - Zentrox Fit</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="screen">
        <div class="header">
            <div class="header-back" onclick="window.location.href='/menu'">←</div>
            <div class="header-title">{{ grupo|upper }}</div>
        </div>
        <div class="content scrollable">
            <div class="treino-banner">
                <div class="treino-banner-icon" id="banner-icon">💪</div>
                <div class="treino-banner-title" id="banner-title">{{ grupo|upper }}</div>
                <div class="treino-banner-subtitle">Seu treino de hoje</div>
            </div>
            
            <div class="obj-selector">
                <button class="obj-btn active" onclick="selectObj(this, 'forca')">Forca</button>
                <button class="obj-btn" onclick="selectObj(this, 'definicao')">Definicao</button>
                <button class="obj-btn" onclick="selectObj(this, 'perda_peso')">Perda de Peso</button>
            </div>
            
            <div id="exercicios-list"></div>
        </div>
        <div class="bottom-bar">
            <button class="btn-treino" onclick="window.location.href='/timer'">INICIAR TREINO</button>
        </div>
    </div>
    <script>
        const grupo = '{{ grupo }}';
        let objetivo = 'forca';
        const icons = { peito: '🏋️', costas: '💪', pernas: '🦵', ombros: '🎯', bracos: '💪', abdomen: '🎯' };
        document.getElementById('banner-icon').textContent = icons[grupo] || '💪';
        
        function selectObj(el, obj) {
            document.querySelectorAll('.obj-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            objetivo = obj;
            carregarExercicios();
        }
        
        async function carregarExercicios() {
            const res = await fetch(`/api/exercicios/${grupo}/${objetivo}`);
            const exercicios = await res.json();
            const container = document.getElementById('exercicios-list');
            container.innerHTML = '';
            exercicios.forEach((ex, i) => {
                container.innerHTML += `
                    <div class="exercise-card">
                        <div class="exercise-header">
                            <div class="exercise-number">${i + 1}</div>
                            <div class="exercise-name">${ex.nome}</div>
                        </div>
                        <div class="exercise-details">
                            <div class="exercise-detail">
                                <span class="detail-label">Series:</span>
                                <span class="detail-value">${ex.series}</span>
                            </div>
                            <div class="exercise-detail">
                                <span class="detail-label">Descanso:</span>
                                <span class="detail-value">${ex.descanso}</span>
                            </div>
                            <div class="exercise-detail">
                                <span class="detail-label">Aparelho:</span>
                                <span class="detail-value">${ex.aparelho}</span>
                            </div>
                        </div>
                        <div class="exercise-alternative">
                            <span class="alt-label">Alternativa em casa:</span>
                            <span class="alt-value">${ex.casa}</span>
                        </div>
                    </div>
                `;
            });
        }
        
        carregarExercicios();
    </script>
</body>
</html>
